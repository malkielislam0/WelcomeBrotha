<!DOCTYPE html>

<html>
<head>




    <title> ESLAM MALKI </title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .background-video video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: blur(8px);
        }

        .page-content {
            position: relative;
            z-index: 1;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .enter-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            color: #ffffff;
            text-align: center;
            padding: 24px;
        }

        .enter-overlay h2 {
            font-size: 2.8rem;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .enter-overlay button {
            border: 2px solid rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.08);
            color: #fff;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 1rem;
            letter-spacing: 0.14em;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .enter-overlay button:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 16px rgba(255,255,255,0.35);
        }

        .enter-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .weapon-spinner {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            animation: weapon-spin 3s linear infinite;
            transform-origin: center;
            z-index: 2;
        }

        .glow-text {
            font-size: 3rem;
            letter-spacing: 0.2em;
            color: #7afcff;
            text-shadow: 0 0 10px #7afcff, 0 0 20px #8a9bff, 0 0 30px #7afcff;
            position: relative;
            display: inline-block;
            animation: pulse 2.5s ease-in-out infinite;
        }

        .glow-text::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 18px;
            background: radial-gradient(circle, rgba(122,252,255,0.35), transparent 60%);
            filter: blur(8px);
            z-index: -1;
        }

        .about-section {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 24px auto;
            padding: 18px 26px;
        }

        .about-glow {
            position: relative;
            z-index: 2;
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 0 0 18px rgba(255, 255, 255, 0.95), 0 0 32px rgba(255, 255, 255, 0.8), 0 0 46px rgba(122, 252, 255, 0.5);
            animation: about-glow 3s ease-in-out infinite;
        }

        .about-glow::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 65%);
            filter: blur(12px);
            opacity: 0.9;
            z-index: -1;
        }

        .particle-container {
            position: relative;
            width: 100%;
            height: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(122,252,255,0.85);
            box-shadow: 0 0 10px rgba(122,252,255,0.8);
            animation: float-particle 3s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 20%; top: 10px; animation-delay: 0s; }
        .particle:nth-child(2) { left: 35%; top: 0; animation-delay: 0.4s; }
        .particle:nth-child(3) { left: 50%; top: 8px; animation-delay: 0.8s; }
        .particle:nth-child(4) { left: 65%; top: 5px; animation-delay: 1.2s; }
        .particle:nth-child(5) { left: 80%; top: 12px; animation-delay: 1.6s; }

        @keyframes weapon-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes about-glow {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 12px rgba(122, 252, 255, 0.75), 0 0 20px rgba(122, 252, 255, 0.6);
            }
            25% {
                transform: scale(1.03);
                text-shadow: 0 0 18px rgba(122, 252, 255, 0.95), 0 0 28px rgba(122, 252, 255, 0.7);
            }
            50% {
                transform: scale(1.02);
                text-shadow: 0 0 22px rgba(122, 252, 255, 1), 0 0 36px rgba(122, 252, 255, 0.8);
            }
            75% {
                transform: scale(1.01);
                text-shadow: 0 0 18px rgba(122, 252, 255, 0.85), 0 0 28px rgba(122, 252, 255, 0.65);
            }
        }

        @keyframes float-particle {
            0% { transform: translateY(0) scale(1); opacity: 0.9; }
            50% { transform: translateY(-24px) scale(1.2); opacity: 0.55; }
            100% { transform: translateY(0) scale(1); opacity: 0.9; }
        }

        .music-menu {
            margin: 24px auto;
            width: 100%;
            max-width: 420px;
            padding: 18px 20px;
            border-radius: 26px;
            background: linear-gradient(180deg, rgba(14, 23, 55, 0.92), rgba(5, 9, 30, 0.95));
            border: 1px solid rgba(122, 252, 255, 0.14);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            text-align: center;
        }

        .music-menu h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            color: #7afcff;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-shadow: 0 0 14px rgba(122, 252, 255, 0.4);
        }

        .music-menu audio {
            width: 100%;
            outline: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
        }

        .music-menu p {
            margin: 0 0 14px;
            color: #dceeff;
            font-size: 0.95rem;
        }

        .autoplay-warning {
            color: #ffd166;
            font-size: 0.92rem;
            margin-top: 8px;
        }

        .cd-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff70d8 0%, #9b5cff 35%, #3c6bff 65%, #00f0ff 100%);
            border: 3px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
            position: relative;
            animation: spin 4s linear infinite;
            flex-shrink: 0;
        }

        .cd-icon::before {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff3a8;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 8px rgba(255,255,255,0.5);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 20px;
        }

        .social-link {
            text-align: center;
            display: inline-block;
        }

        .social-link.tiktok {
            background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('https://images.unsplash.com/photo-1511765224389-37a8b9b4f9d5?auto=format&fit=crop&w=400&q=80') center/cover no-repeat;
            border-radius: 20px;
            padding: 12px 16px;
        }

        .social-link img {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            border: 2px solid #ddd;
            background: white;
            transition: transform 0.25s ease;
        }

        .social-link:hover img {
            transform: scale(1.2);
        }

        .social-link span {
            display: block;
            margin-top: 8px;
            font-size: 14px;
            color: #fff;
        }

        .theme-images {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 30px;
        }

        .theme-card {
            width: 140px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
        }

        .theme-card img {
            width: 100%;
            display: block;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        .theme-card span {
            display: block;
            padding: 10px;
            text-align: center;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>



    <div class="enter-overlay" id="enterOverlay">
        <div>
            <h2>Click to Enter</h2>
            <button id="enterButton">Enter Site</button>
        </div>
    </div>

    <div id="particles-js"></div>
    <div class="background-video">
        <video autoplay muted loop playsinline>
            <source src="Live Wallpaper Anime HD4K - Samurai Autumn.mp4" type="video/mp4">

        </video>
    </div>

    <div class="page-content">
        <div class="weapon-spinner">🛡️</div>
        <h1 class="glow-text">ESLAM MALKI</h1>
        <div class="particle-container">
            <span class="particle"></span>
            <span class="particle"></span>
            <span class="particle"></span>
            <span class="particle"></span>
            <span class="particle"></span>
        </div>
        <div class="music-menu">
            <h3>Music Menu</h3>
           
            <audio id="player" controls preload="auto" loop playsinline>
                <source src="Ela Ké Cavucadinha.mp3" type="audio/mpeg">
                <source src="Ela Ké Cavucadinha.ogg" type="audio/ogg">
            </audio>
           
        </div>

    <div class="about-section">
        <h2 class="glow-text about-glow">About Me</h2>
    </div>
    <div class="social-links">
        <div class="cd-icon"></div>
        <a class="social-link" href="https://www.youtube.com/@Eslam_Roxii" target="_blank" rel="noreferrer noopener">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube">
            
        </a>
        <a class="social-link" href="https://www.instagram.com/islvm.09/" target="_blank" rel="noreferrer noopener">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
            
        </a>
        
        <a class="social-link" href="https://www.tiktok.com/@i.slvm" target="_blank" rel="noreferrer noopener">
            <img src="logo-tik-tok_578229-290.avif" alt="TikTok" alt="YouTube">
         </a>



        <div class="cd-icon"></div>
    </div>

    <div class="theme-images">
        <div class="theme-card">
            <img src="WhatsApp Image 2026-07-12 at 20.07.08.jpeg" alt="Music notes">
            <span>Photographer</span>
        </div>
        <div class="theme-card">
            <img src="WhatsApp Image 2026-07-12 at 19.56.04.jpeg" alt="Headphones">
            <span>Develper</span>
        </div>
        <div class="theme-card">
            <img src="WhatsApp Image 2026-07-12 at 20.05.20.jpeg" alt="Guitar">
            <span>Footballer</span>
        </div>
    </div>

</div>

<script>
    const audio = document.getElementById('player');
    const warning = document.getElementById('autoplay-warning');
    const enterOverlay = document.getElementById('enterOverlay');
    const enterButton = document.getElementById('enterButton');

    function playAudio() {
        if (!audio) return;
        audio.volume = 0.8;
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                if (warning) {
                    warning.textContent = 'Autoplay with sound is blocked by your browser. Click play to start the music.';
                }
            });
        }
    }

    function enterSite() {
        if (enterOverlay) {
            enterOverlay.classList.add('hidden');
        }
        if (audio) {
            audio.muted = false;
        }
        playAudio();
    }

    window.addEventListener('load', () => {
        if (enterButton) {
            enterButton.addEventListener('click', enterSite);
        }
    });
</script>


</body>
</html>
