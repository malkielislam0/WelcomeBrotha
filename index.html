<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shadowverse Bio</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05060d;
        --bg-deep: #01020f;
        --glass: rgba(255,255,255,0.08);
        --glass-strong: rgba(255,255,255,0.12);
        --border: rgba(255,255,255,0.14);
        --blue: #74d6ff;
        --purple: #a160ff;
        --text: #e9eff7;
        --muted: #9fb4d2;
      }

      *{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;font-family:'Inter',system-ui,Segoe UI,Roboto,Arial,sans-serif;background:transparent;color:var(--text);overflow-x:hidden}
      body{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px;overflow-y:auto}

      .bg-video{position:fixed;inset:0;z-index:0;overflow:hidden}
      .bg-video video{position:absolute;top:50%;left:50%;width:auto;height:105%;min-width:105%;min-height:105%;transform:translate(-50%,-50%);object-fit:cover;filter:brightness(.45) saturate(1.2) contrast(.95)}
      .tint{display:none}

      .entry-overlay{position:fixed;inset:0;z-index:12;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#000a14,#02122e 45%,#071826 100%);color:#f8fbff;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
      .entry-overlay h2{font-size:2rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:18px;color:#e9eff7;text-shadow:0 0 30px rgba(116,214,255,0.3)}
      .entry-btn{padding:16px 32px;border-radius:999px;border:1px solid rgba(116,214,255,0.45);background:linear-gradient(135deg,rgba(116,214,255,0.15),rgba(8,30,80,0.95));color:#ffffff;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 18px 40px rgba(15,50,110,0.3);transition:transform .2s ease,box-shadow .2s ease,background .2s ease}
      .entry-btn:hover{transform:translateY(-2px);box-shadow:0 22px 48px rgba(15,50,110,0.4);background:linear-gradient(135deg,rgba(116,214,255,0.25),rgba(20,65,130,0.95))}
      .entry-overlay.hidden{display:none}

      .card{position:relative;z-index:2;width:min(96%,420px);max-width:420px;border-radius:30px;padding:32px 26px;backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);background:linear-gradient(180deg,rgba(255,255,255,0.09),rgba(18,20,41,0.4));border:1px solid var(--border);box-shadow:0 34px 90px rgba(0,0,0,0.45);display:flex;flex-direction:column;align-items:center;gap:24px}

      .badge{position:absolute;top:-12px;right:-12px;padding:10px 16px;border-radius:999px;background:rgba(120,102,255,0.12);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(16px);font-size:.8rem;color:#d4daff;letter-spacing:.12em;z-index:3}
      .avatar{width:128px;height:128px;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,0.14);background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));box-shadow:0 24px 60px rgba(91,41,255,0.14)}
      .avatar img{width:100%;height:100%;object-fit:cover;display:block}
      .weapon-display{width:100%;display:flex;justify-content:center;margin-top:-4px;margin-bottom:14px}
      .weapon{width:104px;height:104px;border-radius:24px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.18);display:grid;place-items:center;box-shadow:0 20px 40px rgba(0,0,0,0.24);}
      .weapon img{width:100%;height:100%;object-fit:contain;display:block;}
      .social-panel{width:100%;display:flex;align-items:center;justify-content:center;gap:18px;margin-top:8px;margin-bottom:14px}
      .socials{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
      .cd{width:60px;height:60px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.2);box-shadow:0 16px 34px rgba(0,0,0,0.22);background:rgba(255,255,255,0.08);display:grid;place-items:center}
      .cd img{width:100%;height:100%;object-fit:cover;display:block}

      .title{font-size:2.4rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(90deg,var(--purple),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(161,96,255,.22),0 0 45px rgba(116,214,255,.14);}
      .subtitle-button{margin-top:10px;padding:12px 26px;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.08);color:#f4f8ff;font-size:.96rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:transform .2s ease,background .2s ease,box-shadow .2s ease;}
      .subtitle-button:hover{transform:translateY(-2px);background:rgba(255,255,255,0.12);box-shadow:0 18px 36px rgba(17,73,142,0.18);}
      .profile-views{margin-top:8px;padding:10px 16px;border-radius:999px;background:rgba(10,15,40,0.7);border:1px solid rgba(116,214,255,0.25);color:#d4daff;font-size:.92rem;font-weight:700;letter-spacing:.08em;position:relative;cursor:default;transition:background .2s ease,transform .2s ease;display:inline-flex;align-items:center;gap:10px;}
      .profile-views:hover{transform:translateY(-1px);background:rgba(14,21,58,0.9)}
      .profile-views::after{content:attr(data-tooltip);position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%);padding:8px 12px;border-radius:12px;background:rgba(11,16,40,0.95);color:#fff;font-size:.82rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;transform:translateX(-50%) translateY(6px);box-shadow:0 16px 40px rgba(0,0,0,0.35);}
      .profile-views:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

      .socials{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
      .socials a{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;background:rgba(3,15,30,0.55);border:1px solid rgba(116,214,255,0.35);transition:transform .24s ease,box-shadow .24s ease,background .24s ease;box-shadow:0 0 18px rgba(116,214,255,0.16);text-decoration:none}
      .socials a:hover{transform:translateY(-4px);background:rgba(11,21,55,0.95);box-shadow:0 0 26px rgba(116,214,255,0.35),0 0 10px rgba(255,255,255,0.12);}
      .socials svg{width:28px;height:28px;filter:drop-shadow(0 0 14px rgba(116,214,255,0.75)) drop-shadow(0 0 6px rgba(255,255,255,0.35));}
      @keyframes spinCd{from{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(360deg)}}
      @keyframes spinWeapon{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

      .player-panel{width:100%;padding:22px;border-radius:24px;background:rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:16px}
      .player-info{display:flex;align-items:center;justify-content:space-between;gap:16px}
      .track{display:flex;flex-direction:column;gap:6px}
      .track-title{font-size:1rem;font-weight:700;color:#f8fbff}
      .track-meta{font-size:.89rem;color:var(--muted)}
      .controls{display:flex;align-items:center;gap:14px}
      .play-btn{width:52px;height:52px;border-radius:18px;border:none;background:linear-gradient(180deg,rgba(116,214,255,0.24),rgba(161,96,255,0.22));color:#fff;font-size:1.2rem;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
      .play-btn:hover{transform:scale(1.04);box-shadow:0 20px 40px rgba(116,214,255,0.2)}
      .progress-wrap{display:flex;align-items:center;gap:14px;font-size:.86rem;color:var(--muted)}
      .progress-bar{flex:1}
      .progress{width:100%;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,0.08);height:10px;border-radius:999px;outline:none;overflow:hidden}
      .progress::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 22px rgba(116,214,255,0.8);cursor:pointer}
      .time{min-width:40px;text-align:right}

      @media (max-width:768px){
        body{padding:16px 12px;align-items:flex-start}
        .entry-overlay{display:flex;align-items:center;justify-content:center;padding:20px 16px}
        .entry-overlay h2{font-size:1.6rem;margin-bottom:16px}
        .entry-btn{padding:14px 24px;font-size:0.95rem;min-width:180px}
        .card{width:min(100%,420px);padding:24px 18px;gap:18px;margin:12px 0}
        .title{font-size:1.9rem}
        .avatar{width:104px;height:104px}
        .social-panel{flex-direction:column;gap:12px}
        .player-panel{padding:16px}
        .track-title{font-size:.95rem}
      }

      @media (max-width:420px){.card{padding:20px}.title{font-size:1.75rem}.avatar{width:96px;height:96px}.track-title{font-size:.9rem}}  
    </style>
</head>
<body>
  <div class="entry-overlay" id="entryOverlay">
    <h2>Enter Shadowverse</h2>
    <button class="entry-btn" id="enterBtn">Click to Enter</button>
  </div>

  <div class="bg-video">
    <video id="bgVideo" muted loop playsinline autoplay>
      <source src="lmomatiil.mp4" type="video/mp4">
    </video>
  </div>

  <article class="card">
    <span class="badge">Eslam`s Empire</span>
    <div class="avatar">
      <img src="WhatsApp Image 2026-07-12 at 19.56.04.jpeg" alt="Profile">
    </div>
    <div class="weapon-display" aria-hidden="true">
      <div class="weapon">
        <img src="https://r2.guns.lol/4cbe137f-d040-4f4d-877c-23eb64d55c85.gif" alt="Spinning weapon">
      </div>
    </div>
    <h1 class="title">Eslam Malki</h1>
    <a class="subtitle-button" id="aboutBtn" href="https://islammallki.github.io/EslamEmpire/" target="_blank" rel="noopener noreferrer">About Me</a>
    <div class="profile-views" data-tooltip="Profile Views Baby"><svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:currentColor;filter:drop-shadow(0 0 12px rgba(116,214,255,0.6));"><path d="M12 4.5c-4.37 0-7.95 3.11-8.81 7.43a.75.75 0 0 0 0 .54C4.05 17.39 7.63 20.5 12 20.5s7.95-3.11 8.81-7.43a.75.75 0 0 0 0-.54C19.95 7.61 16.37 4.5 12 4.5Zm0 13c-3.3 0-6.14-2-7.4-5 1.26-3 4.1-5 7.4-5s6.14 2 7.4 5c-1.26 3-4.1 5-7.4 5Zm0-8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm0 5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg><span>354</span></div>
    <div class="rating-container" aria-label="Profile rating">
      <div class="rating-label">Rate Me</div>
      <div class="rating-stars" role="radiogroup" aria-label="Rating stars">
        <span class="rating-star" data-value="1" role="radio" aria-checked="false">★</span>
        <span class="rating-star" data-value="2" role="radio" aria-checked="false">★</span>
        <span class="rating-star" data-value="3" role="radio" aria-checked="false">★</span>
        <span class="rating-star" data-value="4" role="radio" aria-checked="false">★</span>
        <span class="rating-star" data-value="5" role="radio" aria-checked="false">★</span>
      </div>
      <div class="rating-value" id="ratingValue">0/5</div>
      <div class="rating-thanks" id="ratingThanks">Thank you for the rating!</div>
    </div>

    <div class="social-panel" aria-label="Social links">
      <div class="cd"><img src="https://r2.guns.lol/4b1bba98-009b-4c0d-8e23-936ec8f6889c.gif" alt="Spinning CD"></div>
      <div class="socials">
        <a href="https://www.tiktok.com/@i.slvm" title="TikTok" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24"><path fill="#fff" d="M14.2 3a4.8 4.8 0 0 0-4.8 4.8V11H8.5a3.5 3.5 0 1 0 3.5 3.5V7.8h2.2c.3 0 .6.1.9.1V5.8c-.3 0-.6-.1-.9-.2z"/></svg></a>
        <a href="https://www.instagram.com/islvm.09/" title="Instagram" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="5" ry="5" fill="none" stroke="#fff" stroke-width="2"/><circle cx="12" cy="12" r="3.5" fill="none" stroke="#fff" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1" fill="#fff"/></svg></a>
        <a href="https://www.youtube.com/@Eslam_Roxii" title="YouTube" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="10" rx="3" ry="3" fill="none" stroke="#fff" stroke-width="2"/><polygon fill="#fff" points="10 9.5 16.5 12 10 14.5"/></svg></a>
      </div>
      <div class="cd"><img src="https://r2.guns.lol/a4e3130d-8f88-4ffc-a4a8-8dd59975b953.gif" alt="Spinning CD"></div>
    </div>

    <section class="player-panel" aria-label="Music player">
      <div class="player-info">
        <div class="track">
          <div class="track-title" id="trackTitle">John Wick || Hope</div>
          <div class="track-meta">(ft. NF) (Ayo chiiill)</div>
        </div>
        <button class="play-btn" id="playBtn" aria-label="Play">▶</button>
      </div>
      <div class="progress-wrap">
        <input class="progress" id="progress" type="range" min="0" max="100" value="0">
        <div class="time" id="timeLabel">0:00</div>
      </div>
      <audio id="music" preload="auto" autoplay loop>
        <source src="lmomatiil.mp3" type="audio/mpeg">
      </audio>
    </section>
  </article>

  <script>
    const enterButton = document.getElementById('playBtn');
    const audio = document.getElementById('music');
    const progress = document.getElementById('progress');
    const timeLabel = document.getElementById('timeLabel');
    const trackTitle = document.getElementById('trackTitle');
    const entryOverlay = document.getElementById('entryOverlay');
    const enterBtn = document.getElementById('enterBtn');
    const backgroundVideo = document.getElementById('bgVideo');

    function startMedia(){
      if(backgroundVideo){
        backgroundVideo.play().catch(()=>{});
      }
      if(audio){
        audio.muted = false;
        audio.play().then(()=>{
          enterButton.textContent = '⏸';
        }).catch(()=>{});
      }
    }

    function formatTime(seconds){
      const m = Math.floor(seconds/60);
      const s = Math.floor(seconds%60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    function updateProgress(){
      progress.value = Math.floor(audio.currentTime);
      timeLabel.textContent = formatTime(audio.currentTime);
    }

    audio.addEventListener('loadedmetadata', ()=>{
      progress.max = Math.floor(audio.duration);
      timeLabel.textContent = formatTime(0);
    });

    audio.addEventListener('timeupdate', updateProgress);

    enterButton.addEventListener('click', ()=>{
      if(audio.paused){
        audio.play();
        enterButton.textContent = '⏸';
      } else {
        audio.pause();
        enterButton.textContent = '▶';
      }
    });

    progress.addEventListener('input', ()=>{
      audio.currentTime = progress.value;
      updateProgress();
    });

    const ratingStars = document.querySelectorAll('.rating-star');
    const ratingValue = document.getElementById('ratingValue');
    const ratingThanks = document.getElementById('ratingThanks');
    let currentRating = 0;

    ratingStars.forEach((star, index)=>{
      star.addEventListener('mouseover', ()=>{
        updateRatingVisual(index + 1);
      });
      star.addEventListener('mouseout', ()=>{
        updateRatingVisual(currentRating);
      });
      star.addEventListener('click', ()=>{
        currentRating = index + 1;
        ratingValue.textContent = `${currentRating}/5`;
        ratingStars.forEach((s, i)=>{
          s.setAttribute('aria-checked', i < currentRating ? 'true' : 'false');
        });
        ratingThanks.classList.add('visible');
        clearTimeout(ratingThanks.hideTimeout);
        ratingThanks.hideTimeout = setTimeout(()=>{
          ratingThanks.classList.remove('visible');
        }, 2400);
      });
    });

    function updateRatingVisual(value){
      ratingStars.forEach((star, index)=>{
        if(index < value){
          star.classList.add('filled');
        } else {
          star.classList.remove('filled');
        }
      });
    }

    enterBtn.addEventListener('click', ()=>{
      entryOverlay.classList.add('hidden');
      document.body.style.overflow = 'auto';
      startMedia();
    });

    window.addEventListener('load', ()=>{
      startMedia();
    });

    const aboutBtn = document.getElementById('aboutBtn');
    if(aboutBtn){
      aboutBtn.addEventListener('click', (event)=>{
        event.preventDefault();
        window.open('https://islammallki.github.io/EslamEmpire/', '_blank', 'noopener,noreferrer');
      });
    }
  </script>
</body>
</html>
